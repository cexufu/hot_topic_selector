# 特殊节点配置文件
# 定义节日、节气、特殊日期等信息
# 格式：
#   - date: MM-DD（月-日）
#     name: 节点名称
#     type: 节点类型（festival/solar_term/special）
#     risk_level: 风险级别（high/medium/low）
#     themes: 建议主题列表
#     avoid_suggestions: 规避建议

nodes:
